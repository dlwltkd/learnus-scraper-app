version: '3.8'

services:
  caddy:
    image: caddy:2
    container_name: learnus_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
    restart: always

  api:
    build: .
    container_name: learnus_api
    ports:
      - "8000:8000"   # TODO: remove once all users have updated to HTTPS
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://user:${POSTGRES_PASSWORD}@db:5432/learnus
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DAILY_CHAT_LIMIT=${DAILY_CHAT_LIMIT:-30}
      - DAILY_TRANSCRIBE_LIMIT=${DAILY_TRANSCRIBE_LIMIT:-3}
      - TRANSCRIBE_BYPASS_USERS=${TRANSCRIBE_BYPASS_USERS:-}
      - TRANSCRIBE_BYPASS_TOKENS=${TRANSCRIBE_BYPASS_TOKENS:-}
    depends_on:
      - db
    restart: always
    volumes:
      - ./api_debug.log:/app/api_debug.log

  worker:
    build: .
    container_name: learnus_worker
    command: python worker.py
    environment:
      - DATABASE_URL=postgresql://user:${POSTGRES_PASSWORD}@db:5432/learnus
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WORKER_MAX_CONCURRENCY=${WORKER_MAX_CONCURRENCY:-4}
    depends_on:
      - db
    restart: always
    stop_grace_period: 10m  # give worker up to 10min to finish a transcription before force-kill

  db:
    image: postgres:15
    container_name: learnus_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=learnus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
  caddy_data:
